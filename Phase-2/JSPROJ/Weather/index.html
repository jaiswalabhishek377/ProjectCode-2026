<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="inpsearch">
            <input type="text" placeholder="Search">
            <button><img src="images/search.png" alt=""></button>
        </div>
        <div class="error">Please enter a valid city name</div>
        <div class="weathercontainer">
        <div class="center">
            <img src="images/clouds.png" alt="" class="centerimg">
            <h1 class="temp">22°C</h1>
            <h1 class="city">Bengaluru</h1>
        </div>
        <div class="twofeature">
            <div class="humidity">
                <img src="images/humidity.png" alt="">
                <p>Humidity</p>
                <p class="htext">65%</p>
            </div>
            <div class="wind">
                <img src="images/wind.png" alt="">
                <p>Wind Speed</p>
                <p class="wtext">15 km/h</p>
            </div>
        </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
