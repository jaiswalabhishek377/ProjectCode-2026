<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age - Deadline Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Javascript 👨🏻‍💻</h1>
        <div id="horiz">
            <div class="box">
            <h2>AGE Calculator</h2>
            <input type="date" id="agedob" placeholder="Enter your date of birth">
            <button id="calculateAge">Calculate Age</button>
            <p id="ageResult"></p>
        </div>
        <br>
        <div class="box">
            <h2>DEADLINE Calculator</h2>
            <input type="date" id="deadline" placeholder="Enter the deadline date">
            <button id="calculateDeadline">Calculate Time Remaining</button>
            <p id="deadlineResult"></p>
        </div>
        </div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
