<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stopwatch">
        <h1 id="displayTime">00:00:00</h1>
        <div class="buttons">
        <button id="stop" onclick="watchstop()">⏹</button>
        <button id="start" onclick="watchstart()">▶</button>
        <button id="reset" onclick="watchreset()">↺</button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
